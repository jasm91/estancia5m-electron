name: Build & Release EstanciaPro

on:
  push:
    tags:
      - 'v*'

# Permisos necesarios para crear Releases
permissions:
  contents: write

jobs:
  # ── Crear Release vacío PRIMERO para evitar race condition ──
  # Sin este job, Mac y Windows corren en paralelo y ambos intentan
  # crear el Release simultáneamente → conflict 422 already_exists
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

  build-mac:
    needs: create-release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build Mac (firmado + notarizado)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # ── Camino B: firma Developer ID + notarización en CI ──
          # electron-builder usa CSC_LINK/CSC_KEY_PASSWORD para firmar y,
          # como package.json tiene mac.notarize.teamId, usa notarytool con
          # APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID para notarizar.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run publish:mac

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build Windows
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run publish:win

  bump-pwa-version:
    runs-on: ubuntu-latest
    needs: [build-mac, build-windows]
    steps:
      - name: Checkout PWA repo (si está separado) o notificar
        run: |
          echo "Desktop v${{ github.ref_name }} publicado exitosamente"
          echo "Recuerda hacer bump de la PWA si hubo cambios en ella:"
          echo "  cd estancia5m-pwa && npm run version:patch"
