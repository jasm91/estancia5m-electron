name: Build & Release Jisunu 5M

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Mac (x64 + arm64)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run build -- --mac --publish always

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows (x64 + ia32)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run build -- --win --publish always
