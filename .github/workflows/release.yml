name: Build & Release EstanciaPro

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build Mac
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run publish:mac

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build Windows
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run publish:win

  bump-pwa-version:
    runs-on: ubuntu-latest
    needs: [build-mac, build-windows]
    steps:
      - name: Checkout PWA repo (si está separado) o notificar
        run: |
          echo "Desktop v${{ github.ref_name }} publicado exitosamente"
          echo "Recuerda hacer bump de la PWA si hubo cambios en ella:"
          echo "  cd estancia5m-pwa && npm run version:patch"
